<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Weather Dashboard - Check current weather and 5-day forecast for any city">
    <title>Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <h1>Weather Dashboard</h1>
            </div>
            <button class="location-btn" id="locationBtn" title="Use my location">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </button>
        </header>

        <section class="search-section">
            <form class="search-form" id="searchForm">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input 
                        type="text" 
                        id="cityInput" 
                        class="search-input" 
                        placeholder="Search for a city..."
                        autocomplete="off"
                        aria-label="Search for a city"
                        required
                        minlength="2"
                    >
                    <button type="button" class="clear-btn" id="clearBtn" aria-label="Clear search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <span>Search</span>
                </button>
            </form>
            <div class="unit-toggle">
                <button class="unit-btn active" data-unit="celsius" id="celsiusBtn">°C</button>
                <button class="unit-btn" data-unit="fahrenheit" id="fahrenheitBtn">°F</button>
            </div>
        </section>

        <main class="main-content">
            <!-- Screen reader announcements -->
            <div class="visually-hidden" role="status" aria-live="polite" aria-atomic="true" id="srAnnounce"></div>
            
            <div class="loading-state" id="loadingState" role="status" aria-label="Loading weather data">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <div class="error-state hidden" id="errorState" role="alert" aria-live="assertive">
                <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p class="error-message" id="errorMessage">City not found</p>
                <button class="retry-btn" id="retryBtn">Try Again</button>
            </div>

            <div class="weather-content hidden" id="weatherContent">
                <section class="current-weather">
                    <div class="weather-main">
                        <div class="weather-info">
                            <h2 class="city-name" id="cityName">New York</h2>
                            <p class="country-name" id="countryName">United States</p>
                            <p class="weather-description" id="weatherDescription">Partly Cloudy</p>
                        </div>
                        <div class="weather-display">
                            <img class="weather-icon" id="weatherIcon" src="" alt="Weather icon">
                            <div class="temperature-container">
                                <span class="temperature" id="temperature">22</span>
                                <span class="temperature-unit" id="temperatureUnit">°C</span>
                            </div>
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-card">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v6m0 4v10"/>
                                <path d="M5.5 8.5C8 5 12 5 14 8.5c-2 1-4 2-6.5 2s-4.5-1-4.5-1"/>
                                <path d="M5.5 14.5c2.5-3.5 6.5-3.5 9 0"/>
                                <path d="M4 19c2.5-4 7.5-4 10 0s7.5 4 10 0"/>
                            </svg>
                            <div class="detail-info">
                                <span class="detail-label">Feels Like</span>
                                <span class="detail-value" id="feelsLike">24°C</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                            </svg>
                            <div class="detail-info">
                                <span class="detail-label">Humidity</span>
                                <span class="detail-value" id="humidity">65%</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                            </svg>
                            <div class="detail-info">
                                <span class="detail-label">Wind Speed</span>
                                <span class="detail-value" id="windSpeed">12 km/h</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            <div class="detail-info">
                                <span class="detail-label">Last Updated</span>
                                <span class="detail-value" id="lastUpdated">Just now</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="forecast-section">
                    <h3 class="forecast-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        5-Day Forecast
                    </h3>
                    <div class="forecast-grid" id="forecastGrid">
                    </div>
                </section>
            </div>
        </main>

        <footer class="footer">
            <p>Data provided by <a href="https://openweathermap.org/" target="_blank" rel="noopener noreferrer">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
